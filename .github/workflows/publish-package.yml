# Publish npm package when a GitHub release is created
# Uses npm trusted publishers (OIDC) for authentication
# See: https://docs.npmjs.com/trusted-publishers
name: Publish Package

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Verify version matches release tag
        run: |
          PACKAGE_VERSION=$(jq -r '.version' package.json)
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          # Strip 'v' prefix if present
          RELEASE_VERSION="${RELEASE_TAG#v}"

          if [ "$PACKAGE_VERSION" != "$RELEASE_VERSION" ]; then
            echo "::error::Package version ($PACKAGE_VERSION) does not match release tag ($RELEASE_VERSION)"
            exit 1
          fi

          echo "Version verified: $PACKAGE_VERSION"

      - name: Publish to npm
        run: bun publish --access public --provenance
