# Check for New Prebid.js Releases Daily
#
# This workflow runs daily to check for new Prebid.js releases and builds
# Docker images only for versions that don't already exist in the registry.
#
# For rebuilding ALL images (e.g., after bundler updates), use: publish-prebid-images.yml

name: Check New Prebid Releases

on:
  # Run daily at 6 AM UTC
  schedule:
    - cron: "0 6 * * *"

  # Allow manual trigger
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Check for new Prebid.js versions
  check-new-versions:
    name: Check for New Versions
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.check.outputs.versions }}
      latest: ${{ steps.check.outputs.latest }}
      has_new: ${{ steps.check.outputs.has_new }}
    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for new Prebid.js versions
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Fetch recent Prebid.js release tags from GitHub API
          echo "Fetching Prebid.js releases..."
          PREBID_TAGS=$(curl -sL "https://api.github.com/repos/prebid/Prebid.js/tags?per_page=20" \
            | jq -r '.[].name' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V -r)

          # Get the latest version
          LATEST_VERSION=$(echo "$PREBID_TAGS" | head -n1)
          echo "Latest Prebid.js version: $LATEST_VERSION"
          echo "latest=$LATEST_VERSION" >> "$GITHUB_OUTPUT"

          # Check which images already exist in the registry
          NEW_VERSIONS=""
          IMAGE_BASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE_BASE_LOWER=$(echo "$IMAGE_BASE" | tr '[:upper:]' '[:lower:]')

          # Check the 5 most recent versions
          for VERSION in $(echo "$PREBID_TAGS" | head -n 5); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://ghcr.io/v2/${IMAGE_BASE_LOWER#ghcr.io/}/manifests/$VERSION" 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "Image $VERSION already exists"
            else
              echo "NEW: Image $VERSION does not exist, will build"
              NEW_VERSIONS="$NEW_VERSIONS $VERSION"
            fi
          done

          # Convert to JSON array
          NEW_VERSIONS=$(echo "$NEW_VERSIONS" | xargs)
          if [ -z "$NEW_VERSIONS" ]; then
            echo "No new versions to build"
            echo 'versions=[]' >> "$GITHUB_OUTPUT"
            echo 'has_new=false' >> "$GITHUB_OUTPUT"
          else
            JSON_ARRAY=$(echo "$NEW_VERSIONS" | tr ' ' '\n' | jq -R . | jq -sc .)
            echo "New versions to build: $JSON_ARRAY"
            echo "versions=$JSON_ARRAY" >> "$GITHUB_OUTPUT"
            echo 'has_new=true' >> "$GITHUB_OUTPUT"
          fi

  # Build and push images for new versions only
  build-new-version:
    name: Build ${{ matrix.version }}
    needs: check-new-versions
    if: needs.check-new-versions.outputs.has_new == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.check-new-versions.outputs.versions) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version components
        id: version
        run: |
          VERSION="${{ matrix.version }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)

          echo "full=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MAJOR.$MINOR" >> "$GITHUB_OUTPUT"

          # Check if this is the latest version
          if [ "$VERSION" = "${{ needs.check-new-versions.outputs.latest }}" ]; then
            echo "is_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.full }}
            type=raw,value=${{ steps.version.outputs.minor }}
            type=raw,value=${{ steps.version.outputs.major }}
            type=raw,value=latest,enable=${{ steps.version.outputs.is_latest }}
          labels: |
            org.opencontainers.image.title=Prebid Bundler
            org.opencontainers.image.description=Prebid.js ${{ matrix.version }} bundler service
            org.opencontainers.image.version=${{ matrix.version }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.documentation=${{ github.server_url }}/${{ github.repository }}#readme
            org.opencontainers.image.licenses=MIT
            io.prebid.version=${{ matrix.version }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PREBID_VERSION=${{ matrix.version }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          platforms: linux/amd64,linux/arm64
          provenance: true
          sbom: true

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Output image info
        run: |
          echo "## New Prebid.js Version Built" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version:** ${{ matrix.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Digest:** \`${{ steps.push.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"

  # Summary job
  summary:
    name: Daily Check Summary
    needs: [check-new-versions, build-new-version]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate summary
        run: |
          echo "# Daily Prebid.js Release Check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Latest Prebid.js Version:** ${{ needs.check-new-versions.outputs.latest }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ needs.check-new-versions.outputs.has_new }}" = "true" ]; then
            echo "**New versions built:** ${{ needs.check-new-versions.outputs.versions }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Status:** No new Prebid.js versions detected. All recent versions already have images." >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Pull Latest" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
